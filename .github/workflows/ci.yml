name: CI

on:
  workflow_dispatch:

jobs:
  test:
    name: Build & test
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v5

      - name: Clone sibling LintStudioUI
        run: git clone --depth 1 https://github.com/Joseph-Cursio/LintStudioUI.git ../LintStudioUI

      - name: Show Swift version
        run: swift --version

      - name: Build
        run: swift build

      - name: Test
        run: swift test --parallel

      # Run the linter on its own source as one unit. --include-nested-packages
      # pulls in every first-party package under Packages/ so cross-file rules
      # (e.g. unusedProtocolAbstraction) span the package boundary. Reuses the
      # debug build from the Build step. Gated at `error`: the project is clean
      # of errors today, so this passes now and fails CI only when a new
      # error-severity issue is introduced. All findings still print for
      # visibility; tighten the threshold once the warning backlog is cleared.
      - name: Self-lint (whole project)
        run: swift run CLI . --include-nested-packages --threshold error

  doc-drift:
    name: Doc-drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run drift check
        run: tools/check-doc-drift.py
